{% extends 'posts/base.html' %}

{% block title %}{% if post %}Редактирование{% else %}Создание{% endif %}{% endblock %}

{% block content %}
<h1>{% if post %}Редактирование поста{% else %}Новый пост{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'post_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
